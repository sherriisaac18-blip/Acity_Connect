<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Acity Connect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">AcityConnect</div>
        <div class="links">
            <a href="index.html">Home</a>
            <a href="marketplace.html">Marketplace</a>
            <a href="skills.html">Skills</a>
            <a href="create.html">Create Listing</a>
            <a href="profile.html">Profile</a>
            <a href="interactions.html">Requests</a>
            <a href="admin.html">Admin</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <section class="register">
        <form id="profileForm" class="panel narrow">
            <h1>My Profile</h1>
            <p id="profileNotice" class="muted"></p>

            <label for="profileName">Full Name</label>
            <input id="profileName" type="text" name="name" required>

            <label for="profileEmail">Email</label>
            <input id="profileEmail" type="email" name="email" readonly>

            <label for="profileRoll">Roll Number</label>
            <input id="profileRoll" type="text" name="roll">

            <label for="profileBio">Personal Information</label>
            <textarea id="profileBio" name="bio" placeholder="Course, level, hall, or contact preference"></textarea>

            <label for="profileSkillsOffered">Skills Offered</label>
            <textarea id="profileSkillsOffered" name="skillsOffered"></textarea>

            <label for="profileSkillsNeeded">Skills Needed</label>
            <textarea id="profileSkillsNeeded" name="skillsNeeded"></textarea>

            <button class="register-button" type="submit">Update Profile</button>
            <button class="ghost-button" id="logoutButton" type="button">Logout</button>
        </form>
    </section>

    <footer>
        <div class="copyright">
            &#169; 2026 AcityConnect.
        </div>
        <div class="v-line"></div>
        <div class="socials">
            <p>Follow us: </p>
            <a href="#">Facebook</a>
            <div class="v-line"></div>
            <a href="#">Twitter</a>
            <div class="v-line"></div>
            <a href="#">LinkedIn</a>
        </div>
    </footer>

<script src="script.js"></script>
</body>
</html>
